on:
  push:
    tags:
      - "**"

jobs:
  release:
    runs-on: ubuntu-latest
    container:
      image: quay.io/helmpack/chart-releaser:v1.8.1
    outputs:
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: "${{ secrets.PAT_ACTIONS_WORKFLOWS }}"
          fetch-depth: 0

      - name: add prerequisites
        run: apk add -q curl jq envsubst

      - name: prepare release chart
        run: |
          export APP_VERSION=$(curl -s https://account.fusionauth.io/api/version | jq -r '.versions[]' | sort -V | tail -n 1)
          export CHART_VERSION="${GITHUB_REF##*/}"
          export RELEASE_CHART=/tmp/fusionauth-chart

          echo "Chart: $CHART_VERSION"
          echo "App:   $APP_VERSION"

          rm -rf "$RELEASE_CHART"
          cp -R chart "$RELEASE_CHART"

          for file in Chart.yaml values.yaml README.md examples/minikube/values.yaml
          do
            sed -i \
              -e "s/0\.0\.0-chart-dev/${CHART_VERSION}/g" \
              -e "s/0\.0\.0-app-dev/${APP_VERSION}/g" \
              "$RELEASE_CHART/$file"
          done

          helm lint "$RELEASE_CHART"

          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
          echo "CHART_VERSION=$CHART_VERSION" >> $GITHUB_ENV
          echo "RELEASE_CHART=$RELEASE_CHART" >> $GITHUB_ENV

      - name: lint and test the release chart
        run: |
          helm lint "$RELEASE_CHART" \
            --set database.host=postgres \
            --set database.dbUser.username=fusionauth \
            --set database.dbUser.password=password \
            --set search.host=opensearch

          helm template test "$RELEASE_CHART" \
            --set database.host=postgres \
            --set database.dbUser.username=fusionauth \
            --set database.dbUser.password=password \
            --set search.engine=database \
            --set ingress.enabled=true \
            --set ingress.hosts[0]=example.com \
            --set ingress.paths[0].path=/ \
            --set ingress.paths[0].pathType=Prefix \
            --set autoscaling.enabled=true \
            --set podDisruptionBudget.enabled=true \
            --set serviceMonitor.enabled=true

      - name: configure git
        run: |
          git config --global user.name "$GITHUB_ACTOR"
          git config --global user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git config --global --add safe.directory /__w/charts/charts

      - name: Generate release notes
        run: |
          export CHART_VERSION="${GITHUB_REF##*/}"
          envsubst < release-notes.md > /tmp/release-notes.md

      - name: Release
        id: release
        env:
          CR_TOKEN: "${{ secrets.PAT_ACTIONS_WORKFLOWS }}"
          CR_OWNER: fusionauth
          CR_GIT_REPO: charts
          CR_PACKAGE_PATH: .deploy
          CR_INDEX_PATH: index.yaml
          CR_PAGES_BRANCH: main
          CR_RELEASE_NAME_TEMPLATE: "{{ .Version }}"
        run: |
          cr package "$RELEASE_CHART"
          cr upload --release-notes-file /tmp/release-notes.md
          cr index --push
          ARCHIVE=$(ls ${CR_PACKAGE_PATH})
          echo "version=${ARCHIVE%.*}" >> "$GITHUB_OUTPUT"

  install:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Set up helm
        uses: azure/setup-helm@v4

      - name: Set up kind
        uses: helm/kind-action@v1

      - name: Install the chart in kind
        env:
          CHARTS_REPO: https://fusionauth.github.io/charts
        run: |
          helm repo add fusionauth ${CHARTS_REPO}
          helm install fusionauth fusionauth/fusionauth \
            --set database.host=host \
            --set database.dbUser.username=user \
            --set database.dbUser.password=password \
            --set search.host=host

      - name: Verify the chart version
        env:
          RELEASED_VERSION: ${{ needs.release.outputs.version }}
        run: |
          INSTALLED_VERSION=$(helm list -m1 -f 'fusionauth*' -o json | jq -r '.[0].chart' )
          if [[ "${RELEASED_VERSION}" != "${INSTALLED_VERSION}" ]]; then
            echo "Incorrect Version Installed ..."
            echo "Released Version: ${RELEASED_VERSION}"
            echo "Installed Version: ${INSTALLED_VERSION}"
            exit 1
          else
            echo "Installed ${INSTALLED_VERSION} as expected."
          fi
