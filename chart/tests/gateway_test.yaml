suite: gateway api matrix
templates:
  - httproute.yaml
release:
  name: test
tests:
  - it: does not render by default
    asserts:
      - hasDocuments:
          count: 0

  - it: fails when enabled without parentRefs
    set:
      gateway.enabled: true
    asserts:
      - failedTemplate:
          errorMessage: gateway.enabled requires at least one gateway.parentRefs entry

  - it: renders a default HTTPRoute attached to a Gateway
    set:
      gateway.enabled: true
      gateway.parentRefs:
        - name: shared-gateway
          namespace: gateway-system
          sectionName: https
      gateway.hostnames:
        - auth.example.com
      gateway.annotations:
        testAnnotation: value
      gateway.labels:
        testLabel: value
    asserts:
      - equal:
          path: apiVersion
          value: gateway.networking.k8s.io/v1
      - equal:
          path: kind
          value: HTTPRoute
      - equal:
          path: metadata.name
          value: test-fusionauth
      - equal:
          path: metadata.annotations.testAnnotation
          value: value
      - equal:
          path: metadata.labels.testLabel
          value: value
      - equal:
          path: spec.parentRefs[0]
          value:
            name: shared-gateway
            namespace: gateway-system
            sectionName: https
      - equal:
          path: spec.hostnames[0]
          value: auth.example.com
      - equal:
          path: spec.rules[0].matches[0].path
          value:
            type: PathPrefix
            value: /
      - equal:
          path: spec.rules[0].backendRefs[0]
          value:
            name: test-fusionauth
            port: 9011

  - it: renders custom matches and filters
    set:
      gateway.enabled: true
      gateway.parentRefs:
        - name: shared-gateway
      gateway.rules:
        - matches:
            - path:
                type: Exact
                value: /admin
          filters:
            - type: RequestHeaderModifier
              requestHeaderModifier:
                add:
                  - name: x-forwarded-prefix
                    value: /admin
    asserts:
      - equal:
          path: spec.rules[0].matches[0].path
          value:
            type: Exact
            value: /admin
      - equal:
          path: spec.rules[0].filters[0].type
          value: RequestHeaderModifier
      - equal:
          path: spec.rules[0].backendRefs[0]
          value:
            name: test-fusionauth
            port: 9011
