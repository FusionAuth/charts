{{- include "fusionauth.deployment.validate" . }}
{{- $waitForDb := eq (include "fusionauth.deployment.waitForDb.enabled" .) "true" }}
{{- $waitForSearch := eq (include "fusionauth.deployment.waitForSearch.enabled" .) "true" }}
{{- $kickstartVolumeName := include "fusionauth.kickstart.volumeName" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fusionauth.fullname" . }}
  labels:
    {{- include "fusionauth.labels" . | nindent 4 }}
  {{- with .Values.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "fusionauth.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fusionauth.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "fusionauth.serviceAccountName" . }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
      {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      {{- if or (.Values.extraInitContainers) (or $waitForDb $waitForSearch) }}
      initContainers:
      {{- end }}
        {{- if $waitForDb }}
        - name: wait-for-db
          image: "{{ include "fusionauth.image" (dict "root" . "image" .Values.initContainers.image) }}"
          args:
            - /bin/sh
            - -c
            - >
              set -x;
              until nc -zv '{{- .Values.database.host -}}' {{ .Values.database.port }} >/dev/null 2>&1; do
                echo '.'
                sleep 15;
              done
          resources:
            {{- toYaml .Values.initContainers.resources | nindent 12 }}
        {{- end }}
        {{- if $waitForSearch }}
        - name: wait-for-search
          image: "{{ include "fusionauth.image" (dict "root" . "image" .Values.initContainers.image) }}"
          args:
            - /bin/sh
            - -c
            - >
              set -x;
              until nc -zv '{{- .Values.search.host -}}' {{ .Values.search.port }} >/dev/null 2>&1; do
                echo '.'
                sleep 15;
              done
          resources:
            {{- toYaml .Values.initContainers.resources | nindent 12 }}
        {{- end }}
        {{- if .Values.extraInitContainers }}
        {{- toYaml .Values.extraInitContainers | nindent 8 }}
        {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ include "fusionauth.image" (dict "root" . "image" .Values.image) }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 9011
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          {{- with .Values.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
{{ include "fusionauth.deployment.env" . | trim | indent 12 }}
          resources:
              {{- toYaml .Values.resources | nindent 12 }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- if or .Values.kickstart.enabled .Values.extraVolumeMounts }}
          volumeMounts:
          {{- end }}

          {{- if .Values.kickstart.enabled }}
            - name: {{ $kickstartVolumeName }}
              mountPath: /kickstart
          {{- end }}

          {{- if .Values.extraVolumeMounts }}
          {{- toYaml .Values.extraVolumeMounts | nindent 12 }}
          {{- end }}
        {{- if .Values.extraContainers }}
        {{- toYaml .Values.extraContainers | nindent 8 }}
        {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.dnsConfig }}
      dnsConfig:
      {{- toYaml .Values.dnsConfig |nindent 8 }}
      {{- end }}
      dnsPolicy: {{ .Values.dnsPolicy }}

      {{- if or .Values.kickstart.enabled .Values.extraVolumes  }}
      volumes:
      {{- end }}

      {{- if .Values.extraVolumes }}
      {{- toYaml .Values.extraVolumes | nindent 8 }}
      {{- end }}

      {{- if .Values.kickstart.enabled }}
        - name: {{ $kickstartVolumeName }}
          configMap:
            name: {{ template "fusionauth.fullname" . }}-kickstart-config
      {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Always
