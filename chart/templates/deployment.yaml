{{- if hasKey .Values.podLabels "app.kubernetes.io/name" }}
{{- fail "podLabels cannot override reserved selector label app.kubernetes.io/name" }}
{{- end }}
{{- if hasKey .Values.podLabels "app.kubernetes.io/instance" }}
{{- fail "podLabels cannot override reserved selector label app.kubernetes.io/instance" }}
{{- end }}
{{- $reservedEnv := list "DATABASE_USERNAME" "DATABASE_PASSWORD" "DATABASE_ROOT_USERNAME" "DATABASE_ROOT_PASSWORD" "DATABASE_URL" "SEARCH_TYPE" "SEARCH_USERNAME" "SEARCH_PASSWORD" "SEARCH_SERVERS" "FUSIONAUTH_APP_MEMORY" "FUSIONAUTH_APP_RUNTIME_MODE" "FUSIONAUTH_APP_SILENT_MODE" "FUSIONAUTH_APP_KICKSTART_FILE" }}
{{- range .Values.environment }}
{{- if has .name $reservedEnv }}
{{- fail (printf "environment cannot override reserved chart-managed variable %s" .name) }}
{{- end }}
{{- end }}
{{- $searchExistingSecretEnabled := eq (include "fusionauth.search.existingSecret.enabled" .) "true" }}
{{- $kickstartVolumeName := printf "%s-config-volume" (include "fusionauth.fullname" .) }}
{{- if .Values.kickstart.enabled }}
{{- range .Values.extraVolumes }}
{{- if eq .name $kickstartVolumeName }}
{{- fail (printf "extraVolumes cannot use reserved kickstart volume name %s" $kickstartVolumeName) }}
{{- end }}
{{- end }}
{{- range .Values.extraVolumeMounts }}
{{- if eq .name $kickstartVolumeName }}
{{- fail (printf "extraVolumeMounts cannot use reserved kickstart volume name %s" $kickstartVolumeName) }}
{{- end }}
{{- if eq .mountPath "/kickstart" }}
{{- fail "extraVolumeMounts cannot use reserved kickstart mountPath /kickstart when kickstart.enabled is true" }}
{{- end }}
{{- end }}
{{- end }}
{{- range .Values.extraInitContainers }}
{{- if has .name (list "wait-for-db" "wait-for-search") }}
{{- fail (printf "extraInitContainers cannot use reserved init container name %s" .name) }}
{{- end }}
{{- end }}
{{- range .Values.extraContainers }}
{{- if eq .name $.Chart.Name }}
{{- fail (printf "extraContainers cannot use reserved container name %s" $.Chart.Name) }}
{{- end }}
{{- end }}
{{- $waitForDatabase := eq (include "fusionauth.initContainers.waitForDatabase" .) "true" }}
{{- $waitForSearch := eq (include "fusionauth.initContainers.waitForSearch" .) "true" }}
{{- $deploymentAnnotations := include "fusionauth.deploymentAnnotations" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fusionauth.fullname" . }}
  labels:
    {{- include "fusionauth.labels" . | nindent 4 }}
  {{- with $deploymentAnnotations }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "fusionauth.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fusionauth.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "fusionauth.serviceAccountName" . }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
      {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      {{- if or (.Values.extraInitContainers) (or $waitForDatabase (and (eq .Values.search.engine "elasticsearch") $waitForSearch)) }}
      initContainers:
      {{- end }}
        {{- if $waitForDatabase }}
        - name: wait-for-db
          image: "{{ .Values.initContainers.image.repository }}:{{ .Values.initContainers.image.tag }}"
          args:
            - /bin/sh
            - -c
            - >
              set -x;
              until nc -zv '{{- .Values.database.host -}}' {{ .Values.database.port }} >/dev/null 2>&1; do
                echo '.'
                sleep 15;
              done
          resources:
            {{- toYaml .Values.initContainers.resources | nindent 12 }}
        {{- end }}
        {{- if and (eq .Values.search.engine "elasticsearch") $waitForSearch }}
        - name: wait-for-search
          image: "{{ .Values.initContainers.image.repository }}:{{ .Values.initContainers.image.tag }}"
          args:
            - /bin/sh
            - -c
            - >
              set -x;
              until nc -zv '{{- .Values.search.host -}}' {{ .Values.search.port }} >/dev/null 2>&1; do
                echo '.'
                sleep 15;
              done
          resources:
            {{- toYaml .Values.initContainers.resources | nindent 12 }}
        {{- end }}
        {{- if .Values.extraInitContainers }}
        {{- toYaml .Values.extraInitContainers | nindent 8 }}
        {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 9011
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          {{- with .Values.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: DATABASE_USERNAME
              value: {{ required "A valid username for the database is required!" .Values.database.user | quote }}
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fusionauth.database.secretName" . }}
                  key: {{ include "fusionauth.database.passwordKey" . | quote }}
            {{- if .Values.database.root.user }}
            - name: DATABASE_ROOT_USERNAME
              value: {{ .Values.database.root.user | quote }}
            - name: DATABASE_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fusionauth.database.secretName" . }}
                  key: {{ include "fusionauth.database.rootPasswordKey" . | quote }}
            {{- end }}
            - name: DATABASE_URL
              value: "jdbc:{{ .Values.database.protocol }}://{{- required "A valid database host is required!" .Values.database.host -}}:{{ .Values.database.port }}/{{ .Values.database.name }}{{ include "fusionauth.databaseTLS" . }}"
            - name: SEARCH_TYPE
              value: {{ .Values.search.engine | quote }}
              {{- if eq .Values.search.engine "elasticsearch" }}
              {{- if $searchExistingSecretEnabled }}
            - name: SEARCH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ required "search.basicAuth.existingSecret.name is required when search basic auth uses an existing secret" (include "fusionauth.search.existingSecret.name" .) | quote }}
                  key: {{ include "fusionauth.search.existingSecret.userKey" . | quote }}
            - name: SEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ required "search.basicAuth.existingSecret.name is required when search basic auth uses an existing secret" (include "fusionauth.search.existingSecret.name" .) | quote }}
                  key: {{ include "fusionauth.search.existingSecret.passwordKey" . | quote }}
              {{- end }}
            - name: SEARCH_SERVERS
              value: "{{ .Values.search.protocol }}://{{ include "fusionauth.searchLogin" . }}{{- required "A valid elasticsearch host is required!" .Values.search.host -}}:{{ .Values.search.port }}"
              {{- end }}
            - name: FUSIONAUTH_APP_MEMORY
              value: {{ .Values.app.memory | quote }}
            - name: FUSIONAUTH_APP_RUNTIME_MODE
              value: {{ .Values.app.runtimeMode | quote }}
            - name: FUSIONAUTH_APP_SILENT_MODE
              value: {{ .Values.app.silentMode | quote }}
            {{- if .Values.kickstart.enabled }}
            - name: FUSIONAUTH_APP_KICKSTART_FILE
              value: {{ .Values.kickstart.file | quote }}
            {{- end }}
            {{- if .Values.environment }}
            {{- toYaml .Values.environment |nindent 12 }}
            {{- end }}
          resources:
              {{- toYaml .Values.resources | nindent 12 }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- if or .Values.kickstart.enabled .Values.extraVolumeMounts }}
          volumeMounts:
          {{- end }}

          {{- if .Values.kickstart.enabled }}
            - name: {{ $kickstartVolumeName }}
              mountPath: /kickstart
          {{- end }}

          {{- if .Values.extraVolumeMounts }}
          {{- toYaml .Values.extraVolumeMounts | nindent 12 }}
          {{- end }}
        {{- if .Values.extraContainers }}
        {{- toYaml .Values.extraContainers | nindent 8 }}
        {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.dnsConfig }}
      dnsConfig:
      {{- toYaml .Values.dnsConfig |nindent 8 }}
      {{- end }}
      dnsPolicy: {{ .Values.dnsPolicy }}

      {{- if or .Values.kickstart.enabled .Values.extraVolumes  }}
      volumes:
      {{- end }}

      {{- if .Values.extraVolumes }}
      {{- toYaml .Values.extraVolumes | nindent 8 }}
      {{- end }}

      {{- if .Values.kickstart.enabled }}
        - name: {{ $kickstartVolumeName }}
          configMap:
            name: {{ template "fusionauth.fullname" . }}-kickstart-config
      {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
          {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
    {{- end }}
      restartPolicy: Always
