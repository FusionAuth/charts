{{- if .Values.ingress.enabled -}}
{{- $fullName := include "fusionauth.fullname" . -}}
{{- $ingressPaths := .Values.ingress.paths -}}
{{- $extraPaths := .Values.ingress.extraPaths -}}
{{- if not .Values.ingress.hosts -}}
{{- fail "ingress.enabled requires at least one ingress.hosts entry" -}}
{{- end -}}
{{- if not (or $ingressPaths $extraPaths) -}}
{{- fail "ingress.enabled requires at least one ingress.paths or ingress.extraPaths entry" -}}
{{- end -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "fusionauth.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
{{- if .Values.ingress.ingressClassName }}
  ingressClassName: {{ .Values.ingress.ingressClassName }}
{{- end }}
{{- if .Values.ingress.tls }}
  tls:
  {{- range .Values.ingress.tls }}
    - hosts:
      {{- range .hosts }}
        - {{ . | quote }}
      {{- end }}
      secretName: {{ .secretName }}
  {{- end }}
{{- end }}
  rules:
  {{- range .Values.ingress.hosts }}
    - host: {{ . | quote }}
      http:
        paths:
        {{- if $extraPaths }}
{{ $extraPaths | toYaml | indent 10 }}
        {{- end }}
        {{- range $ingressPaths }}
          - path: {{ or .path . | quote }}
            {{- if .pathType }}
            pathType: {{ .pathType | quote }}
            {{- end }}
            backend:
              service:
                name: {{ $fullName }}
                port:
                  name: http
        {{- end }}
  {{- end }}
{{- end }}
