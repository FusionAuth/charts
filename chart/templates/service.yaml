apiVersion: v1
kind: Service
metadata:
  name: {{ include "fusionauth.fullname" . }}
  labels:
    {{- include "fusionauth.labels" . | nindent 4 }}
  {{- if .Values.service.annotations }}
  annotations:
{{ .Values.service.annotations | toYaml | indent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "fusionauth.selectorLabels" . | nindent 4 }}
