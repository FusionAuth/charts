{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "fusionauth.fullname" . }}
  labels:
    {{- include "fusionauth.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "fusionauth.selectorLabels" . | nindent 6 }}
  policyTypes:
    {{- toYaml .Values.networkPolicy.policyTypes | nindent 4 }}
  {{- if eq .Values.networkPolicy.ingress nil }}
  ingress:
    - ports:
        - port: http
          protocol: TCP
  {{- else }}
  {{- with .Values.networkPolicy.ingress }}
  ingress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- end }}
  {{- with .Values.networkPolicy.egress }}
  egress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
