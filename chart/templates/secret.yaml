{{- include "fusionauth.database.validate" . }}
{{- $dbUserGeneratedSecretEnabled := eq (include "fusionauth.database.dbUser.generatedSecret.enabled" .) "true" -}}
{{- $rootUserGeneratedSecretEnabled := eq (include "fusionauth.database.rootUser.generatedSecret.enabled" .) "true" -}}
{{- if $dbUserGeneratedSecretEnabled -}}
{{- if not (include "fusionauth.database.dbUser.password" .) -}}
{{- fail "database.dbUser.password is required when database.dbUser.existingSecret.enabled is false and DATABASE_PASSWORD is not set in environment; legacy database.password is also accepted" }}
{{- end -}}
apiVersion: v1
data:
  password: {{ include "fusionauth.database.dbUser.password" . | b64enc }}
kind: Secret
metadata:
  labels:
    {{- include "fusionauth.labels" . | nindent 4 }}
  name: {{ include "fusionauth.database.dbUser.secretName" . }}
type: Opaque
{{- end }}
{{ if $rootUserGeneratedSecretEnabled }}
{{ if $dbUserGeneratedSecretEnabled }}
---
{{ end }}
{{- if not (include "fusionauth.database.rootUser.password" .) -}}
{{- fail "database.rootUser.password is required when database.rootUser.username is set, database.rootUser.existingSecret.enabled is false, and DATABASE_ROOT_PASSWORD is not set in environment; legacy database.root.password is also accepted" }}
{{- end -}}
apiVersion: v1
data:
  password: {{ include "fusionauth.database.rootUser.password" . | b64enc }}
kind: Secret
metadata:
  labels:
    {{- include "fusionauth.labels" . | nindent 4 }}
  name: {{ include "fusionauth.database.rootUser.secretName" . }}
type: Opaque
{{- end -}}
