{{- if not (eq (include "fusionauth.database.existingSecret.enabled" .) "true") -}}
{{- if and .Values.database.root.user (not .Values.database.root.password) -}}
{{- fail "database.root.password is required when database.root.user is set and database.existingSecret.enabled is false" }}
{{- end -}}
apiVersion: v1
data:
  password: {{ required "A password for your database is required!" .Values.database.password | b64enc }}
{{- if .Values.database.root.password }}
  rootpassword: {{ .Values.database.root.password | b64enc }}
{{- end }}
kind: Secret
metadata:
  labels:
    {{- include "fusionauth.labels" . | nindent 4 }}
  name: {{ include "fusionauth.database.secretName" . }}
type: Opaque
{{- end -}}
