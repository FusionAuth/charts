# Default values for fusionauth.

# replicaCount -- The number of fusionauth-app instances to run
replicaCount: 1

# image -- Configures the docker image to use for fusionauth-app
image:
  # image.repository -- The name of the docker repository for fusionauth-app
  repository: docker.io/fusionauth/fusionauth-app
  # image.tag -- The docker tag to pull for fusionauth-app
  tag: 0.0.0-app-dev
  # image.pullPolicy -- Kubernetes image pullPolicy to use for fusionauth-app
  pullPolicy: IfNotPresent

# image.imagePullSecrets -- Configures kubernetes secrets to use for pulling private images
imagePullSecrets: []
# nameOverride -- Overrides resource names
nameOverride: ""
# fullnameOverride -- Overrides full resource names
fullnameOverride: ""

# initContainers -- Configures init containers for fusionauth pods. Init containers are used to wait for the database and search engine to be ready before starting fusionauth.
initContainers:
  # initContainers.waitForDatabase -- waits for the database to be ready. Setting this to `false` is not recommended.
  waitForDatabase: true
  # initContainers.waitForSearch -- waits for the search engine to be ready. Setting this to `false` is not recommended.
  waitForSearch: true
  # initContainers.image -- Configures the docker image to use for init containers.
  image:
    # initContainers.image.repository -- Docker image to use for initContainers. This image must contain `nc`, `wget` and a shell of some kind to do a simple loop.
    repository: docker.io/library/busybox
    # initContainers.image.tag -- Tag to use for initContainers docker image
    tag: 1.36.1
  # initContainers.resources -- It is recommended to set these values when you understand FusionAuth's resource usage in your specific environment.
  resources: {}
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

# extraInitContainers -- Add specs for additional init containers if needed.
extraInitContainers: []

# extraContainers -- Add specs for additional containers if needed.
extraContainers: []

service:
  # service.type -- Type of Kubernetes service to create
  type: ClusterIP
  # service.port -- Port for the Kubernetes service to expose
  port: 9011
  # service.annotations -- Extra annotations to add to service object
  annotations: {}

# database -- Configures the database connection for fusionauth
database:
  # database.protocol -- Protocol for jdbc connection to database [`postgresql|mysql`].
  protocol: postgresql
  # database.host -- Hostname or ip of the database instance
  host: ""
  # database.port -- Port of the database instance
  port: 5432
  # database.tls -- Configures whether or not to use tls when connecting to the database
  tls: false
  # database.tlsMode -- If tls is enabled, this configures the mode
  tlsMode: require
  # database.name -- Name of the fusionauth database
  name: fusionauth
  # database.username -- Username for the fusionauth database

  # database.dbUser -- Database credentials for fusionauth to use in normal operation
  dbUser:
    # database.dbUser.username -- Database username for fusionauth to use in normal operation.
    username: ""
    # database.dbUser.password -- Database password for fusionauth to use in normal operation.
    # It is not recommended to set the password in clear text here. Use an existing secret instead.
    # password: ""
    # database.dbUser.existingSecret -- Configures an existing secret that contains the normal database user password.
    existingSecret:
      # database.dbUser.existingSecret.enabled -- Use an existing secret for the normal database user password.
      enabled: false
      # database.dbUser.existingSecret.name -- The name of an existing secret that contains the normal database user password.
      name: ""
      # database.dbUser.existingSecret.passwordKey -- The key in the existing secret that contains the database password.
      passwordKey: password
  # database.rootUser -- Database credentials for fusionauth to use during initial bootstrap
  rootUser:
    # database.rootUser.username -- Database username for fusionauth to use during initial bootstrap
    username: ""
    # database.rootUser.password -- Database password for fusionauth to use during initial bootstrap
    # It is not recommended to set the password in clear text here. Use an existing secret instead.
    # password: ""
    # database.rootUser.existingSecret -- Configures an existing secret that contains the root database user password.
    existingSecret:
      # database.rootUser.existingSecret.enabled -- Use an existing secret for the root database user password.
      enabled: false
      # database.rootUser.existingSecret.name -- The name of an existing secret that contains the root database user password.
      name: ""
      # database.rootUser.existingSecret.passwordKey -- The key in the existing secret that contains the root database password.
      passwordKey: password

# search -- Configures the search engine for fusionauth
search:
  # search.engine -- Defines backend for fusionauth search capabilities. Valid values for engine are 'elasticsearch' or 'database'.
  engine: elasticsearch
  # search.protocol -- Protocol to use when connecting to elasticsearch. Ignored when search.engine is NOT elasticsearch
  protocol: http
  # search.host -- Hostname or ip to use when connecting to elasticsearch. Ignored when search.engine is NOT elasticsearch
  host: ""
  # search.port -- Port to use when connecting to elasticsearch. Ignored when search.engine is NOT elasticsearch
  port: 9200
  # search.basicAuth -- Configures elasticsearch basic auth credentials. Ignored when search.engine is NOT elasticsearch.
  basicAuth:
    # search.basicAuth.enabled -- Enables elasticsearch basic auth using inline username/password. Not required when search.basicAuth.existingSecret.enabled is true.
    enabled: false
    # search.basicAuth.username -- Username to use with elasticsearch basic auth. Ignored when search.basicAuth.existingSecret.enabled is true.
    username: ""
    # search.basicAuth.password -- Password to use with elasticsearch basic auth. Ignored when search.basicAuth.existingSecret.enabled is true.
    password: ""
    # search.basicAuth.existingSecret -- Configures an existing secret that contains elasticsearch basic auth credentials.
    existingSecret:
      # search.basicAuth.existingSecret.enabled -- Use an existing secret for elasticsearch basic auth credentials.
      enabled: false
      # search.basicAuth.existingSecret.name -- The name of an existing secret that contains elasticsearch basic auth credentials.
      name: ""
      # search.basicAuth.existingSecret.userKey -- The key in search.basicAuth.existingSecret.name that contains the elasticsearch username.
      userKey: username
      # -- The key in search.basicAuth.existingSecret.name that contains the elasticsearch password.
      passwordKey: password

# app -- Configures general settings for the fusionauth application
app:
  # app.memory -- Configures the amount of memory Java can use
  memory: 256M
  # app.runtimeMode -- Configures runtime mode for fusionauth. Should be 'development' or 'production'
  # learn more about the difference here: https://fusionauth.io/docs/v1/tech/reference/configuration
  runtimeMode: development
  # app.silentMode -- Configures silent mode for fusionauth. Should be 'true' or 'false'
  # learn more about silent mode here: https://fusionauth.io/docs/get-started/download-and-install/silent-mode
  # silent-mode minimizes downtime during upgrades: https://fusionauth.io/docs/operate/deploy/upgrade#downtime-and-database-migrations
  silentMode: false

# environment - Configure additional environment variables. Should only be used for things that are not explicitly set elsewhere in the chart.
environment: []
  # - name: POD_IP
  #   valueFrom:
  #     fieldRef:
  #       fieldPath: status.podIP
  # - name: FUSIONAUTH_API_KEY
  #   value: test
