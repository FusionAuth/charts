  # - name: FUSIONAUTH_APP_KICKSTART_FILE
  #   value: /kickstart/kickstart.json

# kickstart -- Configures kickstart for initial application setup
kickstart:
  enabled: false
  # kickstart.file -- File path FusionAuth should use for kickstart configuration.
  file: /kickstart/kickstart.json
  data: {}
