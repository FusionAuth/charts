# Default values for fusionauth.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# replicaCount -- The number of fusionauth-app instances to run
replicaCount: 1
image:
  # image.repository -- The name of the docker repository for fusionauth-app
  repository: fusionauth/fusionauth-app
  # image.tag -- The docker tag to pull for fusionauth-app
  tag: 0.0.0-app-dev
  # image.pullPolicy -- Kubernetes image pullPolicy to use for fusionauth-app
  pullPolicy: IfNotPresent

# imagePullSecrets -- Configures kubernetes secrets to use for pulling private images
imagePullSecrets: []

initContainers:
  # This image should contain `nc`, `wget` and a shell of some kind to do a simple loop.
  image:
    # initContainers.image.repository -- Docker image to use for initContainers
    repository: busybox
    # initContainers.image.tag -- Tag to use for initContainers docker image
    tag: latest
  # initContainers.resources -- Resource requests and limits to use for initContainers
  resources:
    {}
    # We usually recommend not to specify default resources and to leave this as a conscious
    # choice for the user. This also increases chances charts run on environments with little
    # resources, such as Minikube. If you do want to specify resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    # limits:
    #  cpu: 100m
    #  memory: 128Mi
    # requests:
    #  cpu: 100m
    #  memory: 128Mi

# nameOverride -- Overrides resource names
nameOverride: ""
# fullnameOverride -- Overrides full resource names
fullnameOverride: ""

service:
  # service.type -- Type of Kubernetes service to create
  type: ClusterIP
  # service.port -- Port for the Kubernetes service to expose
  port: 9011
  # service.annotations -- Extra annotations to add to service object
  annotations: {}

database:
  # database.protocol -- Should either be postgresql or mysql. Protocol for jdbc connection to database
  protocol: postgresql
  # database.host -- Hostname or ip of the database instance
  host: pg-minikube-postgresql.default.svc.cluster.local
  # database.port -- Port of the database instance
  port: 5432
  # database.tls -- Configures whether or not to use tls when connecting to the database
  tls: false
  # database.tlsMode -- If tls is enabled, this configures the mode
  tlsMode: require
  # database.name -- Name of the fusionauth database
  name: fusionauth

  # database.fusionauthUser -- Database credentials for fusionauth to use in normal operation
  fusionauthUser:
    # database.fusionauthUser.username -- Database username for fusionauth to use in normal operation
    username: "fusionauth"
    # database.fusionauthUser.password -- Database password for fusionauth to use in normal operation - not required if database.fusionauthUser.existingSecret.enabled is true
    password: "minikube-password"
    # database.fusionauthUser.existingSecret -- Configures an existing secret that contains the normal database user credentials.
    existingSecret:
      # database.fusionauthUser.existingSecret.enabled -- Use an existing secret for the normal database user credentials.
      enabled: false
      # database.fusionauthUser.existingSecret.name -- The name of an existing secret that contains the normal database user credentials.
      name: ""
      # database.fusionauthUser.existingSecret.usernameKey -- The key in database.fusionauthUser.existingSecret.name that contains the database username.
      usernameKey: username
      # database.fusionauthUser.existingSecret.passwordKey -- The key in database.fusionauthUser.existingSecret.name that contains the database password.
      passwordKey: password
  # database.rootUser -- Database credentials for fusionauth to use during initial bootstrap
  rootUser:
    # database.rootUser.username -- Database username for fusionauth to use during initial bootstrap - not required if you have manually bootstrapped your database
    username: "postgres"
    # database.rootUser.password -- Database password for fusionauth to use during initial bootstrap - not required if database.rootUser.existingSecret.enabled is true
    password: "minikube-password"
    # database.rootUser.existingSecret -- Configures an existing secret that contains the root database user credentials.
    existingSecret:
      # database.rootUser.existingSecret.enabled -- Use an existing secret for the root database user credentials.
      enabled: false
      # database.rootUser.existingSecret.name -- The name of an existing secret that contains the root database user credentials.
      name: ""
      # database.rootUser.existingSecret.usernameKey -- The key in database.rootUser.existingSecret.name that contains the root database username.
      usernameKey: username
      # database.rootUser.existingSecret.passwordKey -- The key in database.rootUser.existingSecret.name that contains the root database password.
      passwordKey: password

search:
  # search.engine -- Defines backend for fusionauth search capabilities. Valid values for engine are 'elasticsearch' or 'database'.
  engine: elasticsearch
  # search.protocol -- Protocol to use when connecting to elasticsearch. Ignored when search.engine is NOT elasticsearch
  protocol: http
  # search.host -- Hostname or ip to use when connecting to elasticsearch. Ignored when search.engine is NOT elasticsearch
  host: elasticsearch-master.default.svc.cluster.local
  # search.port -- Port to use when connecting to elasticsearch. Ignored when search.engine is NOT elasticsearch
  port: 9200
  # search.basicAuth -- Configures elasticsearch basic auth credentials. Ignored when search.engine is NOT elasticsearch.
  basicAuth:
    # search.basicAuth.enabled -- Enables elasticsearch basic auth using inline username/password. Not required when search.basicAuth.existingSecret.enabled is true.
    enabled: false
    # search.basicAuth.username -- Username to use with elasticsearch basic auth. Ignored when search.basicAuth.existingSecret.enabled is true.
    username: ""
    # search.basicAuth.password -- Password to use with elasticsearch basic auth. Ignored when search.basicAuth.existingSecret.enabled is true.
    password: ""
    # search.basicAuth.existingSecret -- Configures an existing secret that contains elasticsearch basic auth credentials.
    existingSecret:
      # search.basicAuth.existingSecret.enabled -- Use an existing secret for elasticsearch basic auth credentials.
      enabled: false
      # search.basicAuth.existingSecret.name -- The name of an existing secret that contains elasticsearch basic auth credentials.
      name: ""
      # search.basicAuth.existingSecret.userKey -- The key in search.basicAuth.existingSecret.name that contains the elasticsearch username.
      userKey: username
      # search.basicAuth.existingSecret.passwordKey -- The key in search.basicAuth.existingSecret.name that contains the elasticsearch password.
      passwordKey: password

app:
  # app.memory -- Configures the amount of memory Java can use
  memory: 256M
  # app.runtimeMode -- Configures runtime mode for fusionauth. Should be 'development' or 'production'
  runtimeMode: development
  # app.silentMode -- Configures silent mode for fusionauth. Should be 'true' or 'false'
  silentMode: true

# environment - Configure additional environment variables. Should only be used for things that are not explicitly set elsewhere in the chart.
environment:
  []
